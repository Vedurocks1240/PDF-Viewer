<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap');

:root {
  --black:   #0a0a0a;
  --black2:  #111111;
  --black3:  #1a1a1a;
  --black4:  #242424;
  --black5:  #2e2e2e;
  --red:     #c0392b;
  --red-lt:  #e74c3c;
  --red-dim: rgba(192,57,43,0.15);
  --green:   #1e8449;
  --green-lt:#27ae60;
  --blue:    #1a5276;
  --blue-lt: #2471a3;
  --orange:  #d35400;
  --orange-lt:#e67e22;
  --white:   #f0f0ec;
  --white-d: #a0a09a;
  --white-dd:#505050;
  --border:  rgba(240,240,236,0.06);
  --border2: rgba(240,240,236,0.12);
  --border3: rgba(240,240,236,0.2);
  --radius:  6px;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}

body{
  background:var(--black);
  color:var(--white);
  font-family:'Syne',sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* ── TOPBAR ── */
#topbar{
  height:52px;
  background:var(--black2);
  border-bottom:1px solid var(--border2);
  display:flex;
  align-items:center;
  padding:0 1rem;
  gap:1rem;
  flex-shrink:0;
  position:relative;
  z-index:10;
}

.brand{
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.brand-icon{
  width:28px;height:28px;border-radius:4px;
  background:var(--red);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.brand-icon svg{width:14px;height:14px;fill:var(--white);}
.brand-name{
  font-size:13px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--white);
  font-family:'DM Mono',monospace;
}

.sep{width:1px;height:24px;background:var(--border2);flex-shrink:0;}

/* Upload button */
.upload-btn{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:var(--radius);
  background:var(--red);color:var(--white);
  font-size:11px;font-weight:700;letter-spacing:0.8px;
  text-transform:uppercase;font-family:'DM Mono',monospace;
  cursor:pointer;border:none;transition:background .15s;
  flex-shrink:0;
}
.upload-btn:hover{background:var(--red-lt);}
.upload-btn svg{width:12px;height:12px;fill:currentColor;}

/* File name */
#fileLabel{
  font-size:12px;color:var(--white-d);
  font-family:'DM Mono',monospace;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:240px;flex:1;
}

/* Spacer */
.flex-spacer{flex:1;}

/* Nav controls */
.nav-group{
  display:flex;align-items:center;gap:4px;
  flex-shrink:0;
}
.nav-btn{
  width:30px;height:30px;border-radius:var(--radius);
  background:transparent;border:1px solid var(--border2);
  color:var(--white-d);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;flex-shrink:0;
}
.nav-btn:hover:not(:disabled){border-color:var(--orange);color:var(--orange);}
.nav-btn:disabled{opacity:.25;cursor:not-allowed;}
.nav-btn svg{width:14px;height:14px;fill:currentColor;pointer-events:none;}

.page-counter{
  font-size:12px;font-family:'DM Mono',monospace;
  color:var(--white-d);padding:0 8px;white-space:nowrap;
}
#pageInput{
  width:36px;background:var(--black3);border:1px solid var(--border2);
  border-radius:4px;color:var(--white);font-size:12px;font-family:'DM Mono',monospace;
  text-align:center;padding:3px 4px;outline:none;
}
#pageInput:focus{border-color:var(--orange);}

.sep2{width:1px;height:20px;background:var(--border);flex-shrink:0;}

/* Zoom */
.zoom-group{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.zoom-label{
  font-size:11px;font-family:'DM Mono',monospace;
  color:var(--white-dd);min-width:38px;text-align:center;
}

/* Tool buttons */
.tool-btn{
  width:30px;height:30px;border-radius:var(--radius);
  background:transparent;border:1px solid var(--border2);
  color:var(--white-d);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;flex-shrink:0;
  position:relative;
}
.tool-btn:hover{border-color:var(--blue-lt);color:var(--blue-lt);}
.tool-btn.active{background:var(--blue);border-color:var(--blue-lt);color:var(--white);}
.tool-btn svg{width:13px;height:13px;fill:currentColor;pointer-events:none;}

/* Download */
.dl-btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:var(--radius);
  background:transparent;border:1px solid var(--border2);
  color:var(--white-d);font-size:11px;font-family:'DM Mono',monospace;
  letter-spacing:.5px;text-transform:uppercase;
  cursor:pointer;transition:all .15s;flex-shrink:0;
}
.dl-btn:hover:not(:disabled){border-color:var(--green);color:var(--green);}
.dl-btn:disabled{opacity:.3;cursor:not-allowed;}
.dl-btn svg{width:12px;height:12px;fill:currentColor;}

/* ── BODY LAYOUT ── */
#body{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR (thumbnails) ── */
#sidebar{
  width:160px;flex-shrink:0;
  background:var(--black2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;transition:width .2s;
}
#sidebar.collapsed{width:0;border-right:none;}
.sidebar-hdr{
  padding:10px 12px;
  font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--white-dd);font-family:'DM Mono',monospace;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
#thumbList{
  flex:1;overflow-y:auto;padding:8px;
  display:flex;flex-direction:column;gap:6px;
}
#thumbList::-webkit-scrollbar{width:3px;}
#thumbList::-webkit-scrollbar-thumb{background:var(--black5);border-radius:3px;}

.thumb-item{
  border-radius:4px;overflow:hidden;cursor:pointer;
  border:1.5px solid transparent;
  background:var(--black4);
  transition:border-color .12s;
  flex-shrink:0;
}
.thumb-item:hover{border-color:var(--border3);}
.thumb-item.active{border-color:var(--red);}
.thumb-canvas{width:100%;display:block;}
.thumb-num{
  font-size:9px;font-family:'DM Mono',monospace;
  color:var(--white-dd);text-align:center;padding:3px 0;
}

/* ── MAIN VIEWER ── */
#viewerWrap{
  flex:1;overflow:auto;
  background:var(--black3);
  display:flex;flex-direction:column;
  align-items:center;
  padding:1.5rem 1rem;
  gap:1rem;
  position:relative;
}
#viewerWrap::-webkit-scrollbar{width:6px;height:6px;}
#viewerWrap::-webkit-scrollbar-track{background:var(--black3);}
#viewerWrap::-webkit-scrollbar-thumb{background:var(--black5);border-radius:6px;}

/* ── DROP OVERLAY ── */
#dropOverlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1.5rem;z-index:5;
  background:var(--black3);
}
.drop-zone{
  border:1.5px dashed var(--border3);
  border-radius:12px;
  padding:3.5rem 4rem;
  text-align:center;
  cursor:pointer;
  transition:border-color .15s,background .15s;
  max-width:420px;width:90%;
}
.drop-zone:hover,.drop-zone.over{
  border-color:var(--red);
  background:var(--red-dim);
}
.drop-icon{
  width:52px;height:52px;margin:0 auto 1.2rem;
  background:var(--black4);border-radius:10px;
  border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
}
.drop-icon svg{width:24px;height:24px;fill:var(--red);}
.drop-title{font-size:17px;font-weight:700;margin-bottom:6px;color:var(--white);}
.drop-sub{font-size:12px;color:var(--white-dd);line-height:1.6;font-family:'DM Mono',monospace;}
.drop-chips{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:1rem;}
.drop-chip{
  font-size:10px;padding:3px 9px;border-radius:20px;
  font-family:'DM Mono',monospace;font-weight:500;
  border:1px solid var(--border2);color:var(--white-dd);
  background:var(--black4);
}
.drop-chip.r{border-color:rgba(192,57,43,.35);color:var(--red-lt);background:var(--red-dim);}
.drop-chip.g{border-color:rgba(30,132,73,.35);color:var(--green-lt);background:rgba(30,132,73,.1);}
.drop-chip.b{border-color:rgba(26,82,118,.5);color:#5dade2;background:rgba(26,82,118,.15);}
.drop-chip.o{border-color:rgba(211,84,0,.35);color:var(--orange-lt);background:rgba(211,84,0,.1);}

/* ── PAGE CANVAS ── */
.page-wrap{
  position:relative;
  box-shadow:0 8px 40px rgba(0,0,0,.7);
  border-radius:3px;
  overflow:hidden;
  flex-shrink:0;
}
.page-canvas{display:block;}

/* ── PROGRESS BAR ── */
#progressBar{
  position:fixed;top:52px;left:0;right:0;height:2px;
  background:var(--black2);z-index:20;display:none;
}
#progressFill{
  height:100%;
  background:linear-gradient(90deg,var(--red),var(--orange));
  transition:width .2s;
  width:0%;
}

/* ── STATUS BAR ── */
#statusBar{
  height:26px;
  background:var(--black2);
  border-top:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 1rem;gap:1rem;
  flex-shrink:0;
}
.status-item{
  font-size:10px;font-family:'DM Mono',monospace;
  color:var(--white-dd);display:flex;align-items:center;gap:4px;
}
.status-dot{width:5px;height:5px;border-radius:50%;}
.status-dot.red{background:var(--red);}
.status-dot.green{background:var(--green);}
.status-dot.orange{background:var(--orange);}
.status-spacer{flex:1;}

/* ── SEARCH OVERLAY ── */
#searchBar{
  position:absolute;top:10px;right:16px;z-index:10;
  background:var(--black2);border:1px solid var(--border2);
  border-radius:var(--radius);padding:6px 10px;
  display:none;align-items:center;gap:6px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
#searchBar.show{display:flex;}
#searchInput{
  background:transparent;border:none;outline:none;
  color:var(--white);font-size:12px;font-family:'DM Mono',monospace;
  width:180px;
}
#searchInput::placeholder{color:var(--white-dd);}
.search-count{font-size:10px;font-family:'DM Mono',monospace;color:var(--white-dd);}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--black2);border:1px solid var(--border2);
  border-radius:var(--radius);padding:7px 14px;
  font-size:11px;font-family:'DM Mono',monospace;color:var(--white-d);
  opacity:0;transition:all .2s;pointer-events:none;z-index:100;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{border-color:var(--green);color:var(--green-lt);}
#toast.err{border-color:var(--red);color:var(--red-lt);}

/* ── SCROLLBAR PAGE mode ── */
#viewerWrap.continuous{flex-direction:column;padding:1rem;}
#viewerWrap.single{flex-direction:row;align-items:center;justify-content:center;padding:1.5rem;}

/* ── FULLSCREEN ── */
:fullscreen body,
:-webkit-full-screen body,
:-moz-full-screen body {
  height:100vh;
}
:fullscreen #topbar,
:-webkit-full-screen #topbar,
:-moz-full-screen #topbar {
  border-bottom-color:rgba(240,240,236,0.18);
}
/* Fullscreen overlay hint — shown briefly on enter */
#fsHint{
  position:fixed;bottom:2.5rem;left:50%;
  transform:translateX(-50%) translateY(0);
  background:rgba(10,10,10,0.85);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  padding:6px 14px;
  font-size:11px;font-family:'DM Mono',monospace;
  color:var(--white-d);
  opacity:0;pointer-events:none;z-index:200;
  transition:opacity .3s;
  white-space:nowrap;
}
#fsHint.show{opacity:1;}
.tool-btn.fs-active{background:var(--orange);border-color:var(--orange-lt);color:var(--white);}
</style>
</head>
<body>

<!-- PROGRESS BAR -->
<div id="progressBar"><div id="progressFill"></div></div>

<!-- TOP BAR -->
<div id="topbar">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M6 2h9l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm0 2v16h12V8h-4V4H6zm2 8h8v2H8v-2zm0 4h5v2H8v-2z"/></svg>
    </div>
    <span class="brand-name">PDFx</span>
  </div>

  <div class="sep"></div>

  <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
    <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
    Open
  </button>
  <input type="file" id="fileInput" accept=".pdf" style="display:none">

  <span id="fileLabel">no file loaded</span>

  <div class="flex-spacer"></div>

  <!-- Page nav -->
  <div class="nav-group">
    <button class="nav-btn" id="firstBtn" title="First page" disabled onclick="goToPage(1)">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6V6zm3.5 6l8.5 6V6l-8.5 6z"/></svg>
    </button>
    <button class="nav-btn" id="prevBtn" title="Previous" disabled onclick="goToPage(state.page-1)">
      <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
    </button>
    <input id="pageInput" type="number" min="1" value="1" onchange="goToPage(parseInt(this.value))">
    <span class="page-counter" id="pageTotal">/ —</span>
    <button class="nav-btn" id="nextBtn" title="Next" disabled onclick="goToPage(state.page+1)">
      <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
    </button>
    <button class="nav-btn" id="lastBtn" title="Last page" disabled onclick="goToPage(state.totalPages)">
      <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2V6zM6 18l8.5-6L6 6v12z"/></svg>
    </button>
  </div>

  <div class="sep2"></div>

  <!-- Zoom -->
  <div class="zoom-group">
    <button class="nav-btn" id="zoomOutBtn" title="Zoom out" disabled onclick="adjustZoom(-0.15)">
      <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
    </button>
    <span class="zoom-label" id="zoomLabel">100%</span>
    <button class="nav-btn" id="zoomInBtn" title="Zoom in" disabled onclick="adjustZoom(0.15)">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </button>
    <button class="nav-btn" id="fitBtn" title="Fit to width" disabled onclick="fitToWidth()">
      <svg viewBox="0 0 24 24"><path d="M3 3h7v2H5v4H3V3zm11 0h7v6h-2V5h-5V3zM3 13h2v4h5v2H3v-6zm16 4h-5v2h7v-6h-2v4z"/></svg>
    </button>
  </div>

  <div class="sep2"></div>

  <!-- Tools -->
  <button class="tool-btn" id="thumbToggle" title="Thumbnails" onclick="toggleSidebar()">
    <svg viewBox="0 0 24 24"><path d="M3 5h4v4H3V5zm0 6h4v4H3v-4zm0 6h4v4H3v-4zm6-12h12v2H9V5zm0 6h12v2H9v-2zm0 6h12v2H9v-2z"/></svg>
  </button>
  <button class="tool-btn" id="contToggle" title="Continuous scroll" onclick="toggleContinuous()">
    <svg viewBox="0 0 24 24"><path d="M3 4h18v2H3V4zm0 7h18v2H3v-2zm0 7h18v2H3v-2z"/></svg>
  </button>
  <button class="tool-btn" id="searchToggle" title="Search (Ctrl+F)" onclick="toggleSearch()">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
  </button>
  <button class="tool-btn" id="fsBtn" title="Fullscreen (F11)" onclick="toggleFullscreen()">
    <svg id="fsIcon" viewBox="0 0 24 24"><path d="M3 3h7v2H5v4H3V3zm11 0h7v6h-2V5h-5V3zM3 13h2v4h5v2H3v-6zm16 4h-5v2h7v-6h-2v4z"/></svg>
  </button>

  <div class="sep2"></div>

  <!-- Download -->
  <button class="dl-btn" id="dlBtn" disabled onclick="downloadPDF()">
    <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm7-18l-5 5h3v6h4v-6h3l-5-5z"/></svg>
    Save
  </button>
</div>

<!-- BODY -->
<div id="body">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-hdr">Pages</div>
    <div id="thumbList"></div>
  </div>

  <!-- Viewer -->
  <div id="viewerWrap" class="single">
    <!-- Search bar -->
    <div id="searchBar">
      <svg style="width:12px;height:12px;fill:var(--white-dd);flex-shrink:0" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input id="searchInput" type="text" placeholder="Search in PDF…" oninput="onSearch(this.value)">
      <span class="search-count" id="searchCount"></span>
      <button class="nav-btn" style="width:22px;height:22px;border:none;" onclick="clearSearch()">
        <svg viewBox="0 0 24 24" style="width:10px;height:10px;fill:var(--white-dd)"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>

    <!-- Drop zone -->
    <div id="dropOverlay">
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="drop-icon">
          <svg viewBox="0 0 24 24"><path d="M6 2h9l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm0 2v16h12V8h-4V4H6zm2 8h8v2H8v-2zm0 4h5v2H8v-2z"/></svg>
        </div>
        <div class="drop-title">Drop a PDF here</div>
        <div class="drop-sub">or click to browse files<br>Rendered locally — never uploaded</div>
        <div class="drop-chips">
          <span class="drop-chip r">.pdf</span>
          <span class="drop-chip g">local render</span>
          <span class="drop-chip b">zoom &amp; nav</span>
          <span class="drop-chip o">thumbnails</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- STATUS BAR -->
<div id="statusBar">
  <div class="status-item"><div class="status-dot orange" id="statusDot"></div><span id="statusText">Ready</span></div>
  <div class="status-spacer"></div>
  <div class="status-item" id="sizeInfo"></div>
  <div class="sep2" style="margin:0 4px;"></div>
  <div class="status-item" id="dimInfo"></div>
</div>

<!-- FULLSCREEN HINT -->
<div id="fsHint">Press <kbd style="background:var(--black4);padding:1px 5px;border-radius:3px;border:1px solid var(--border2);">Esc</kbd> or <kbd style="background:var(--black4);padding:1px 5px;border-radius:3px;border:1px solid var(--border2);">F11</kbd> to exit fullscreen</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const state = {
  pdf: null,
  page: 1,
  totalPages: 0,
  zoom: 1.0,
  continuous: false,
  sidebarOpen: true,
  rendering: false,
  fileBytes: null,
  fileName: '',
  thumbsRendered: new Set(),
};

// ── FILE HANDLING ──────────────────────────────────────────
const fileInput = document.getElementById('fileInput');
const dropZone  = document.getElementById('dropZone');
const viewerWrap = document.getElementById('viewerWrap');

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) openFile(fileInput.files[0]);
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') openFile(f);
  else toast('Please drop a PDF file', 'err');
});

viewerWrap.addEventListener('dragover', e => { e.preventDefault(); });
viewerWrap.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') openFile(f);
});

async function openFile(file) {
  state.fileName = file.name;
  document.getElementById('fileLabel').textContent = file.name;
  setStatus('Loading…', 'orange');
  showProgress(10);

  const bytes = await file.arrayBuffer();
  state.fileBytes = bytes;
  document.getElementById('sizeInfo').textContent = (file.size / 1024).toFixed(0) + ' KB';

  const loadingTask = pdfjsLib.getDocument({ data: bytes });
  loadingTask.onProgress = (p) => {
    if (p.total) showProgress(10 + (p.loaded / p.total) * 50);
  };

  try {
    state.pdf = await loadingTask.promise;
    state.totalPages = state.pdf.numPages;
    state.page = 1;

    showProgress(70);
    document.getElementById('pageTotal').textContent = '/ ' + state.totalPages;
    document.getElementById('pageInput').max = state.totalPages;

    // Get first page dimensions
    const firstPage = await state.pdf.getPage(1);
    const vp = firstPage.getViewport({ scale: 1 });
    document.getElementById('dimInfo').textContent = Math.round(vp.width) + ' × ' + Math.round(vp.height) + ' pt';

    // Compute fit-to-width zoom
    await computeFitZoom();

    enableControls();
    document.getElementById('dropOverlay').style.display = 'none';

    showProgress(85);
    await renderCurrentView();
    showProgress(100);
    setTimeout(hideProgress, 400);

    setStatus('Loaded · ' + state.totalPages + ' page' + (state.totalPages !== 1 ? 's' : ''), 'green');
    toast('Opened ' + file.name, 'ok');

    // Build thumbs lazily
    buildThumbPlaceholders();
    renderVisibleThumbs();
  } catch(e) {
    console.error(e);
    hideProgress();
    setStatus('Error loading file', 'red');
    toast('Failed to load PDF: ' + e.message, 'err');
  }
}

async function computeFitZoom() {
  const wrap = viewerWrap.getBoundingClientRect();
  const page = await state.pdf.getPage(1);
  const vp = page.getViewport({ scale: 1 });
  const padding = state.continuous ? 32 : 80;
  state.zoom = Math.min(2.5, Math.max(0.3, (wrap.width - padding) / vp.width));
  updateZoomLabel();
}

// ── RENDERING ─────────────────────────────────────────────
async function renderCurrentView() {
  if (!state.pdf) return;
  if (state.continuous) {
    await renderAllPages();
  } else {
    await renderSinglePage(state.page);
  }
  updateNav();
}

async function renderSinglePage(pageNum) {
  if (state.rendering) return;
  state.rendering = true;

  // Clear old pages
  viewerWrap.querySelectorAll('.page-wrap').forEach(el => el.remove());

  const page = await state.pdf.getPage(pageNum);
  const vp = page.getViewport({ scale: state.zoom });

  const wrap = document.createElement('div');
  wrap.className = 'page-wrap';
  const canvas = document.createElement('canvas');
  canvas.className = 'page-canvas';
  canvas.width = vp.width;
  canvas.height = vp.height;
  wrap.appendChild(canvas);
  viewerWrap.appendChild(wrap);

  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  state.rendering = false;

  // Highlight active thumb
  highlightThumb(pageNum);
}

async function renderAllPages() {
  if (state.rendering) return;
  state.rendering = true;

  viewerWrap.querySelectorAll('.page-wrap').forEach(el => el.remove());

  for (let n = 1; n <= state.totalPages; n++) {
    const page = await state.pdf.getPage(n);
    const vp = page.getViewport({ scale: state.zoom });

    const wrap = document.createElement('div');
    wrap.className = 'page-wrap';
    wrap.dataset.pageNum = n;

    const canvas = document.createElement('canvas');
    canvas.className = 'page-canvas';
    canvas.width = vp.width;
    canvas.height = vp.height;
    wrap.appendChild(canvas);

    // Page label
    const lbl = document.createElement('div');
    lbl.style.cssText = 'position:absolute;bottom:-20px;right:0;font-size:9px;font-family:DM Mono,monospace;color:var(--white-dd);';
    lbl.textContent = n;
    wrap.appendChild(lbl);

    viewerWrap.appendChild(wrap);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  }

  state.rendering = false;

  // Scroll observer for page tracking
  setupScrollObserver();
}

function setupScrollObserver() {
  const observer = new IntersectionObserver((entries) => {
    let maxRatio = 0, activePage = state.page;
    entries.forEach(e => {
      if (e.intersectionRatio > maxRatio) {
        maxRatio = e.intersectionRatio;
        activePage = parseInt(e.target.dataset.pageNum);
      }
    });
    if (activePage !== state.page) {
      state.page = activePage;
      document.getElementById('pageInput').value = state.page;
      highlightThumb(state.page);
      updateNav();
    }
  }, { root: viewerWrap, threshold: [0, 0.25, 0.5, 0.75, 1] });

  viewerWrap.querySelectorAll('.page-wrap').forEach(el => observer.observe(el));
}

// ── THUMBNAILS ─────────────────────────────────────────────
function buildThumbPlaceholders() {
  const list = document.getElementById('thumbList');
  list.innerHTML = '';
  state.thumbsRendered.clear();

  for (let i = 1; i <= state.totalPages; i++) {
    const item = document.createElement('div');
    item.className = 'thumb-item' + (i === 1 ? ' active' : '');
    item.dataset.page = i;
    item.onclick = () => { goToPage(i); };

    const canvas = document.createElement('canvas');
    canvas.className = 'thumb-canvas';
    canvas.dataset.page = i;
    item.appendChild(canvas);

    const num = document.createElement('div');
    num.className = 'thumb-num';
    num.textContent = i;
    item.appendChild(num);

    list.appendChild(item);
  }

  // Observe thumb visibility
  const obs = new IntersectionObserver(async (entries) => {
    for (const e of entries) {
      if (e.isIntersecting) {
        const pg = parseInt(e.target.dataset.page);
        if (!state.thumbsRendered.has(pg)) {
          state.thumbsRendered.add(pg);
          await renderThumb(pg, e.target);
        }
      }
    }
  }, { root: document.getElementById('thumbList'), threshold: 0.1 });

  list.querySelectorAll('.thumb-canvas').forEach(c => obs.observe(c));
}

async function renderThumb(pageNum, canvas) {
  if (!state.pdf) return;
  try {
    const page = await state.pdf.getPage(pageNum);
    const vp = page.getViewport({ scale: 0.2 });
    canvas.width = vp.width;
    canvas.height = vp.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  } catch(e) { /* ignore */ }
}

function renderVisibleThumbs() {
  // Will be handled by intersection observer above
}

function highlightThumb(pageNum) {
  document.querySelectorAll('.thumb-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.page) === pageNum);
  });
  const active = document.querySelector('.thumb-item.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ── NAVIGATION ─────────────────────────────────────────────
function goToPage(n) {
  if (!state.pdf) return;
  n = Math.max(1, Math.min(state.totalPages, n));
  state.page = n;
  document.getElementById('pageInput').value = n;

  if (state.continuous) {
    const wrap = viewerWrap.querySelector(`.page-wrap[data-page-num="${n}"]`);
    if (wrap) wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    renderSinglePage(n);
  }
  updateNav();
  highlightThumb(n);
}

function updateNav() {
  const hasPdf = !!state.pdf;
  document.getElementById('prevBtn').disabled = !hasPdf || state.page <= 1;
  document.getElementById('nextBtn').disabled = !hasPdf || state.page >= state.totalPages;
  document.getElementById('firstBtn').disabled = !hasPdf || state.page <= 1;
  document.getElementById('lastBtn').disabled = !hasPdf || state.page >= state.totalPages;
  document.getElementById('pageInput').value = state.page;
}

// ── ZOOM ───────────────────────────────────────────────────
function adjustZoom(delta) {
  state.zoom = Math.max(0.25, Math.min(4.0, state.zoom + delta));
  updateZoomLabel();
  renderCurrentView();
}

function fitToWidth() {
  computeFitZoom().then(() => renderCurrentView());
}

function updateZoomLabel() {
  document.getElementById('zoomLabel').textContent = Math.round(state.zoom * 100) + '%';
}

// ── SIDEBAR ────────────────────────────────────────────────
function toggleSidebar() {
  state.sidebarOpen = !state.sidebarOpen;
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('thumbToggle');
  sidebar.classList.toggle('collapsed', !state.sidebarOpen);
  btn.classList.toggle('active', state.sidebarOpen);
}

// ── CONTINUOUS MODE ────────────────────────────────────────
function toggleContinuous() {
  state.continuous = !state.continuous;
  const btn = document.getElementById('contToggle');
  btn.classList.toggle('active', state.continuous);
  viewerWrap.className = state.continuous ? 'continuous' : 'single';
  if (state.pdf) renderCurrentView();
}

// ── SEARCH ─────────────────────────────────────────────────
function toggleSearch() {
  const bar = document.getElementById('searchBar');
  const btn = document.getElementById('searchToggle');
  bar.classList.toggle('show');
  btn.classList.toggle('active', bar.classList.contains('show'));
  if (bar.classList.contains('show')) document.getElementById('searchInput').focus();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('searchBar').classList.remove('show');
  document.getElementById('searchToggle').classList.remove('active');
}

let searchTimer;
async function onSearch(query) {
  clearTimeout(searchTimer);
  if (!query || !state.pdf) { document.getElementById('searchCount').textContent = ''; return; }
  searchTimer = setTimeout(async () => {
    let total = 0;
    for (let i = 1; i <= state.totalPages; i++) {
      const page = await state.pdf.getPage(i);
      const content = await page.getTextContent();
      const text = content.items.map(it => it.str).join(' ');
      const matches = (text.match(new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi')) || []).length;
      total += matches;
    }
    document.getElementById('searchCount').textContent = total > 0 ? total + ' match' + (total !== 1 ? 'es' : '') : 'no results';
  }, 400);
}

// ── DOWNLOAD ───────────────────────────────────────────────
function downloadPDF() {
  if (!state.fileBytes) return;
  const blob = new Blob([state.fileBytes], { type: 'application/pdf' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = state.fileName || 'document.pdf';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Saved ' + state.fileName, 'ok');
}

// ── CONTROLS ───────────────────────────────────────────────
function enableControls() {
  ['prevBtn','nextBtn','firstBtn','lastBtn','zoomInBtn','zoomOutBtn','fitBtn','dlBtn'].forEach(id => {
    document.getElementById(id).disabled = false;
  });
}

// ── PROGRESS ───────────────────────────────────────────────
function showProgress(pct) {
  const bar = document.getElementById('progressBar');
  bar.style.display = 'block';
  document.getElementById('progressFill').style.width = pct + '%';
}
function hideProgress() {
  document.getElementById('progressBar').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
}

// ── STATUS ─────────────────────────────────────────────────
function setStatus(text, color) {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + color;
}

// ── TOAST ──────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = (type === 'err' ? '⚠ ' : '✓ ') + msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}

// ── FULLSCREEN ─────────────────────────────────────────────
const FS_ENTER_ICON = '<path d="M3 3h7v2H5v4H3V3zm11 0h7v6h-2V5h-5V3zM3 13h2v4h5v2H3v-6zm16 4h-5v2h7v-6h-2v4z"/>';
const FS_EXIT_ICON  = '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>';

let fsHintTimer;
function toggleFullscreen() {
  if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement) {
    // Enter fullscreen
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
  } else {
    // Exit fullscreen
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
  }
}

function onFullscreenChange() {
  const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
  const btn  = document.getElementById('fsBtn');
  const icon = document.getElementById('fsIcon');
  const hint = document.getElementById('fsHint');

  btn.classList.toggle('fs-active', isFs);
  btn.title = isFs ? 'Exit fullscreen (F11)' : 'Fullscreen (F11)';
  icon.innerHTML = isFs ? FS_EXIT_ICON : FS_ENTER_ICON;

  if (isFs) {
    hint.classList.add('show');
    clearTimeout(fsHintTimer);
    fsHintTimer = setTimeout(() => hint.classList.remove('show'), 2800);
  } else {
    hint.classList.remove('show');
  }

  // Re-render to use new viewport size
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (state.pdf) computeFitZoom().then(() => renderCurrentView());
  }, 150);
}

document.addEventListener('fullscreenchange',       onFullscreenChange);
document.addEventListener('webkitfullscreenchange', onFullscreenChange);
document.addEventListener('mozfullscreenchange',    onFullscreenChange);

// ── KEYBOARD ───────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); toggleSearch(); return; }
  if (e.key === 'F11') { e.preventDefault(); toggleFullscreen(); return; }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goToPage(state.page + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goToPage(state.page - 1);
  if (e.key === '+' || e.key === '=') adjustZoom(0.15);
  if (e.key === '-') adjustZoom(-0.15);
  if (e.key === '0' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); fitToWidth(); }
});

// ── RESIZE ─────────────────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (state.pdf) renderCurrentView();
  }, 200);
});

// ── INIT SIDEBAR STATE ─────────────────────────────────────
document.getElementById('thumbToggle').classList.add('active');
</script>
</body>
</html>
